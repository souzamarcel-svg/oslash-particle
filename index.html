<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O-Slash Particles</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: transparent; overflow: hidden; }
    canvas { display: block; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ── CONFIG ────────────────────────────────────────────────
const COUNT      = 10000;
const SPEED_MULT = 0.8;
const PARAMS     = { size:22, thick:0.20, dep:1.8, swarm:0.18, spd:0.8, tilt:0.38 };
const addControl = (id, _l, _min, _max, val) =>
  PARAMS[id] !== undefined ? PARAMS[id] : val;

// ── SCENE ─────────────────────────────────────────────────
const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 2000);
camera.position.set(0, 0, 100);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

// ── POST-PROCESSING ───────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), 1.8, 0.4, 0
);
composer.addPass(bloom);

// ── CONTROLS ──────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping  = true;
controls.autoRotate     = true;
controls.autoRotateSpeed = 1.5;

// ── INSTANCED MESH ────────────────────────────────────────
const geometry = new THREE.TetrahedronGeometry(0.28);
const material = new THREE.MeshBasicMaterial({ vertexColors: true });
const mesh     = new THREE.InstancedMesh(geometry, material, COUNT);
mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
scene.add(mesh);

// ── DATA ──────────────────────────────────────────────────
const positions = Array.from({ length: COUNT }, () =>
  new THREE.Vector3(
    (Math.random() - 0.5) * 80,
    (Math.random() - 0.5) * 80,
    (Math.random() - 0.5) * 80
  )
);
const dummy  = new THREE.Object3D();
const target = new THREE.Vector3();
const color  = new THREE.Color();

// ── ANIMATE ───────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime() * SPEED_MULT;

  for (let i = 0; i < COUNT; i++) {
    const size  = addControl('size',  '', 2,   30,  22);
    const thick = addControl('thick', '', 0.1, 0.5, 0.20);
    const dep   = addControl('dep',   '', 0.5, 4.0, 1.8);
    const swarm = addControl('swarm', '', 0,   1.5, 0.18);
    const spd   = addControl('spd',   '', 0,   3.0, 0.8);
    const tilt  = addControl('tilt',  '', 0,   1.0, 0.38);

    const t = time * spd;
    const n = i / COUNT;

    const pulse = 1.0 + Math.sin(t * 0.7) * 0.03;
    const R     = size * pulse;
    const halfT = thick * size;
    const halfD = halfT * dep;

    const ringFrac = 0.70;
    const isRing   = n < ringFrac;

    let px, py, pz;

    if (isRing) {
      const rn    = n / ringFrac;
      const theta = rn * Math.PI * 2;
      const phi   = (i * 2.39996) % (Math.PI * 2);
      const cosT  = Math.cos(theta + t * 0.15);
      const sinT  = Math.sin(theta + t * 0.15);
      const cosP  = Math.cos(phi);
      const sinP  = Math.sin(phi);
      px = (R + halfT * cosP) * cosT;
      py = (R + halfT * cosP) * sinT;
      pz = halfD * sinP;
    } else {
      const slashIdx   = i - Math.floor(COUNT * ringFrac);
      const slashCount = COUNT - Math.floor(COUNT * ringFrac);
      const sn   = slashIdx / slashCount;
      const st   = sn * 2.0 - 1.0;
      const sa   = 0.52;
      const sLen = R * 1.28;
      const phi2    = (slashIdx * 2.39996) % (Math.PI * 2);
      const offPerp = Math.cos(phi2) * halfT;
      const offZ    = Math.sin(phi2) * halfD;
      const dX =  Math.sin(sa);
      const dY =  Math.cos(sa);
      const pX =  Math.cos(sa);
      const pY = -Math.sin(sa);
      px = st * dX * sLen + offPerp * pX;
      py = st * dY * sLen + offPerp * pY;
      pz = offZ;
    }

    const rotY  = t * 0.15;
    const cosRY = Math.cos(rotY);
    const sinRY = Math.sin(rotY);
    const rxRot = px * cosRY - pz * sinRY;
    const rzRot = px * sinRY + pz * cosRY;

    const tiltAng = tilt * 0.65;
    const cosTX   = Math.cos(tiltAng);
    const sinTX   = Math.sin(tiltAng);
    const ryFin   = py  * cosTX - rzRot * sinTX;
    const rzFin   = py  * sinTX + rzRot * cosTX;

    const nt = t * 0.55 + n * 11.0;
    const nx = Math.sin(nt * 1.3 + n * 6.1) * swarm * 0.28;
    const ny = Math.cos(nt * 1.0 + n * 4.9) * swarm * 0.28;
    const nz = Math.sin(nt * 0.8 + n * 8.3) * swarm * 0.2;

    target.set(rxRot + nx, ryFin + ny, rzFin + nz);

    // Cor #C70202
    const hue = 0.0;
    const sat = 0.98;
    const lit = 0.39 + Math.sin(n * Math.PI * 10 + t * 1.8) * 0.08
                     + (isRing ? 0.0 : 0.04);
    color.setHSL(hue, sat, lit);

    positions[i].lerp(target, 0.1);
    dummy.position.copy(positions[i]);
    dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
    mesh.setColorAt(i, color);
  }

  mesh.instanceMatrix.needsUpdate = true;
  if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;

  controls.update();
  composer.render();
}
animate();

// ── RESIZE ────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
