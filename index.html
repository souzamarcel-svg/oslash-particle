<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particles Swarm Export</title>
    <style>body { margin: 0; overflow: hidden; background: #000; }</style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // CONFIG
        const COUNT = 10000;
        const SPEED_MULT = 0.8;
        const AUTO_SPIN = true;

        // SETUP
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.01);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 0, 100);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = AUTO_SPIN;
        controls.autoRotateSpeed = 2.0;

        // POST PROCESSING
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.strength = 1.8; bloomPass.radius = 0.4; bloomPass.threshold = 0;
        composer.addPass(bloomPass);

        // SWARM OBJECTS
        const dummy = new THREE.Object3D();
        const color = new THREE.Color();
        const target = new THREE.Vector3();
        const pColor = new THREE.Color(); // Kept for safety, for potential references
        
        // INSTANCED MESH
        const geometry = new THREE.TetrahedronGeometry(0.25);
        const material = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        const instancedMesh = new THREE.InstancedMesh(geometry, material, COUNT);
        instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(instancedMesh);

        // DATA ARRAYS
        const positions = [];
        for(let i=0; i<COUNT; i++) {
            positions.push(new THREE.Vector3((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100));
            instancedMesh.setColorAt(i, color.setHex(0x00ff88)); // Init Color
        }

        // CONTROL STUBS
        const PARAMS = {"size":22,"thick":0.204,"dep":1.025,"swarm":0.18,"spd":0.8,"tilt":0.38};
        const addControl = (id, label, min, max, val) => {
            return PARAMS[id] !== undefined ? PARAMS[id] : val;
        };
        const setInfo = () => {};
        const annotate = () => {};

        // ANIMATION LOOP
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime() * SPEED_MULT;
            
            // Shader Time Update
            if(material.uniforms && material.uniforms.uTime) {
                material.uniforms.uTime.value = time;
            }

            controls.update();

            // SWARM LOGIC
            const count = COUNT; // Alias for user code compatibility
            for(let i=0; i<COUNT; i++) {
                 // USER CODE INJECTION START
                 const size  = addControl("size",  "Tamanho",        2,  30,  22);
                 const thick = addControl("thick", "Espessura Anel", 0.1, 0.5, 0.20);
                 const dep   = addControl("dep",   "Profundidade 3D",0.5, 4.0, 1.8);
                 const swarm = addControl("swarm", "Swarm",          0,   1.5, 0.18);
                 const spd   = addControl("spd",   "Velocidade",     0,   3.0, 0.8);
                 const tilt  = addControl("tilt",  "Inclinacao",     0,   1.0, 0.38);
                 
                 if (i === 0) {
                   setInfo("Simbolo O-Slash 3D", "Simbolo O 15k particulas #FF0033");
                   annotate("o", new THREE.Vector3(0, 0, 0), "O");
                 }
                 
                 const t = time * spd;
                 const n = i / count;
                 
                 const pulse = 1.0 + Math.sin(t * 0.7) * 0.03;
                 const R     = size * pulse;
                 const halfT = thick * size;
                 const halfD = halfT * dep;
                 
                 const ringFrac = 0.70;
                 const isRing   = n < ringFrac;
                 
                 let px, py, pz;
                 
                 if (isRing) {
                   const rn    = n / ringFrac;
                   const theta = rn * Math.PI * 2;
                   const phi   = (i * 2.39996) % (Math.PI * 2);
                 
                   const cosT = Math.cos(theta + t * 0.15);
                   const sinT = Math.sin(theta + t * 0.15);
                   const cosP = Math.cos(phi);
                   const sinP = Math.sin(phi);
                 
                   px = (R + halfT * cosP) * cosT;
                   py = (R + halfT * cosP) * sinT;
                   pz = halfD * sinP;
                 
                 } else {
                   const slashIdx   = i - Math.floor(count * ringFrac);
                   const slashCount = count - Math.floor(count * ringFrac);
                   const sn = slashIdx / slashCount;
                   const st = sn * 2.0 - 1.0;
                 
                   const sa   = 0.52;
                   const sLen = R * 1.28;
                 
                   const phi2    = (slashIdx * 2.39996) % (Math.PI * 2);
                   const offPerp = Math.cos(phi2) * halfT;
                   const offZ    = Math.sin(phi2) * halfD;
                 
                   const dX =  Math.sin(sa);
                   const dY =  Math.cos(sa);
                   const pX =  Math.cos(sa);
                   const pY = -Math.sin(sa);
                 
                   px = st * dX * sLen + offPerp * pX;
                   py = st * dY * sLen + offPerp * pY;
                   pz = offZ;
                 }
                 
                 const rotY  = t * 0.15;
                 const cosRY = Math.cos(rotY);
                 const sinRY = Math.sin(rotY);
                 const rxRot = px * cosRY - pz * sinRY;
                 const rzRot = px * sinRY + pz * cosRY;
                 
                 const tiltAng = tilt * 0.65;
                 const cosTX   = Math.cos(tiltAng);
                 const sinTX   = Math.sin(tiltAng);
                 const ryFin   = py * cosTX - rzRot * sinTX;
                 const rzFin   = py * sinTX + rzRot * cosTX;
                 
                 const nt = t * 0.55 + n * 11.0;
                 const nx = Math.sin(nt * 1.3 + n * 6.1) * swarm * 0.28;
                 const ny = Math.cos(nt * 1.0 + n * 4.9) * swarm * 0.28;
                 const nz = Math.sin(nt * 0.8 + n * 8.3) * swarm * 0.2;
                 
                 target.set(rxRot + nx, ryFin + ny, rzFin + nz);
                 
                 // Cor #FF0033 = HSL(348°, 100%, 50%) = hue 0.967
                 const hue = 0.0;
                 const sat = 98;
                 const lit = 0.39 + Math.sin(n * Math.PI * 10 + t * 1.8) * 0.10 + (isRing ? 0.0 : 0.05);
                 color.setHSL(hue, sat, lit);
                 
                 // USER CODE INJECTION END

                 // LERP & UPDATE
                 positions[i].lerp(target, 0.1);
                 dummy.position.copy(positions[i]);
                 dummy.updateMatrix();
                 instancedMesh.setMatrixAt(i, dummy.matrix);
                 instancedMesh.setColorAt(i, color); // Fix: Use 'color' which user modifies
            }
            instancedMesh.instanceMatrix.needsUpdate = true;
            instancedMesh.instanceColor.needsUpdate = true;

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
